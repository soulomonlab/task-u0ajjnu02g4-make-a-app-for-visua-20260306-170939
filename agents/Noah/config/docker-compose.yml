version: '3.8'
services:
  web:
    build: .
    image: visual-inspection-app:latest
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: vi_user
      POSTGRES_PASSWORD: vi_pass
      POSTGRES_DB: vi_db
    volumes:
      - db-data:/var/lib/postgresql/data
volumes:
  db-data:
